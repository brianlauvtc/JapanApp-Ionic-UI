<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title mode="ios">設定</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-bg-light">
  <form [formGroup]="settingsForm">
    
    <ion-list inset="true">
      <ion-list-header>
        <ion-label color="medium">一般設定</ion-label>
      </ion-list-header>
      
      <ion-item lines="full">
        <ion-icon name="cash-outline" slot="start" color="success"></ion-icon>
        <ion-select formControlName="baseCurrency" interface="popover" label="預設基礎貨幣" label-placement="start">
          <ion-select-option value="HKD">HKD (港幣)</ion-select-option>
          <ion-select-option value="JPY">JPY (日圓)</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="none" class="rate-item">
        <ion-icon name="trending-up-outline" slot="start" color="secondary"></ion-icon>
        <ion-label>
          <h3>目前市場真實匯率</h3>
          <p *ngIf="isRateLoading">
            <ion-spinner name="dots" size="small"></ion-spinner> 正在獲取最新匯率...
          </p>
          <p *ngIf="!isRateLoading && hkdToJpy" class="rate-text">
            1 HKD = <strong>{{ hkdToJpy | number:'1.2-2' }}</strong> JPY <br>
            <span class="sub-rate">1 JPY = {{ jpyToHkd | number:'1.4-4' }} HKD</span>
          </p>
          <p *ngIf="!isRateLoading && !hkdToJpy" class="rate-error">
            ❌ 無法載入即時匯率，請檢查網路連線。
          </p>
        </ion-label>
        <ion-button slot="end" fill="clear" size="small" (click)="fetchRealExchangeRate()" [disabled]="isRateLoading">
          <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <ion-list inset="true">
      <ion-list-header>
        <ion-label color="medium">AI 助理設定</ion-label>
      </ion-list-header>

      <ion-item lines="full">
        <ion-icon name="key-outline" slot="start" color="warning"></ion-icon>
        <ion-input 
          formControlName="apiKey" 
          type="password" 
          label="Gemini API Key" 
          label-placement="stacked"
          placeholder="輸入金鑰解鎖 AI 功能"
          clear-input="true">
        </ion-input>
      </ion-item>

      <ion-item lines="full">
        <ion-icon name="time-outline" slot="start" color="primary"></ion-icon>
        <ion-select formControlName="aiFrequency" interface="popover" label="自動分析頻率" label-placement="stacked">
          <ion-select-option *ngFor="let option of aiFrequencyOptions" [value]="option.value">
            {{ option.label }}
          </ion-select-option>
        </ion-select>
      </ion-item>
      
      <div class="field-note">
        控制 AI 讀取資料的頻率，以節省 API 配額。
      </div>

      <ion-item lines="none">
        <ion-icon name="chatbubbles-outline" slot="start" color="tertiary"></ion-icon>
        <ion-toggle formControlName="enableAIHistory" justify="space-between">
          讀取過往建議
          <p style="font-size: 12px; color: var(--ion-color-medium); margin: 0;">加強對話連貫性</p>
        </ion-toggle>
      </ion-item>
    </ion-list>

    <ion-list inset="true" class="danger-list">
      <ion-item button detail="false" lines="none" (click)="clearAllData()">
        <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
        <ion-label color="danger">
          <strong>清空所有紀錄與帳戶</strong>
        </ion-label>
      </ion-item>
    </ion-list>

  </form>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar>
    <div class="footer-btn-container">
      <ion-button expand="block" (click)="saveSettings()" color="primary" class="save-btn" shape="round">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        儲存設定
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
