<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>AI Analysis Engine</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center bg-radial-dark">
  <div class="analysis-wrapper">
    <div class="scanner-container">
      <div class="scanning-laser"></div>
      <div class="cube-container">
        <ion-icon name="sparkles" class="sparkle-core"></ion-icon>
      </div>
    </div>

    <div class="status-box ion-padding">
      <h2 class="font-weight-bold tracking-wide">Analyzing Documents</h2>
      <p class="text-muted text-sm ion-margin-bottom">
        Gemini 2.5 Flash is extracting itemizations, calculating cross-currency metrics, and selecting financial categories.
      </p>

      <div class="counter-badge ion-margin-vertical" *ngIf="totalImages > 0">
        Receipt <span class="highlight">{{ currentImageIndex + 1 }}</span> of <span>{{ totalImages }}</span>
      </div>

      <div class="progress-bar-container ion-margin-top">
        <ion-progress-bar 
          [value]="(currentImageIndex) / totalImages" 
          color="secondary" 
          class="custom-progress">
        </ion-progress-bar>
      </div>
    </div>

    <div class="logger-box ion-text-left ion-padding">
      <div class="log-line current">
        <ion-spinner name="dots" color="secondary"></ion-spinner>
        <span>Running optical character matching...</span>
      </div>
      <div class="log-line text-muted">
        <ion-icon name="checkmark-circle" color="success"></ion-icon>
        <span>Secure runtime API pipeline connected.</span>
      </div>
    </div>
  </div>
</ion-content>
