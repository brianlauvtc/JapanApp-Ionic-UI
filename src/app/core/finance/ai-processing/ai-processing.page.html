<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title mode="ios">AI 分析中</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="modern-step-indicator">
    <div class="step active"><span class="step-num">✓</span><span class="step-text">上傳</span></div>
    <div class="step-line active"></div>
    <div class="step active"><span class="step-num">2</span><span class="step-text">分析</span></div>
    <div class="step-line"></div>
    <div class="step"><span class="step-num">3</span><span class="step-text">確認</span></div>
  </div>
  <div class="analysis-wrapper">
    
    <div class="scanner-container">
      <div class="scanning-laser"></div>
      <div class="cube-container">
        <ion-icon name="sparkles" class="sparkle-core"></ion-icon>
      </div>
    </div>

    <div class="status-box">
      <h2>正在解析收據內容</h2>
      <p>Gemini AI 正在為您提取購物明細、轉換匯率並進行智能分類。</p>

      <div class="counter-badge" *ngIf="totalImages > 0">
        正在處理第 <span class="highlight">{{ currentImageIndex + 1 }}</span> 張 / 共 {{ totalImages }} 張
      </div>

      <div class="progress-bar-container ion-margin-top">
        <ion-progress-bar 
          [type]="isProcessing ? 'indeterminate' : 'determinate'"
          [value]="(currentImageIndex) / totalImages"
          color="primary" 
          class="custom-progress">
        </ion-progress-bar>
      </div>
    </div>

    <div class="logger-box">
      <div class="log-line" [class.current]="isProcessing">
        <ion-spinner name="dots" [color]="isProcessing ? 'primary' : 'medium'"></ion-spinner>
        <span>{{ isProcessing ? 'Gemini 正在分析收據...' : '準備下一張...' }}</span>
      </div>
      <div class="log-line" [class.text-muted]="!isProcessing">
        <ion-icon name="checkmark-circle" color="success"></ion-icon>
        <span>安全 API 通道已連接。</span>
      </div>
    </div>
    
  </div>
</ion-content>
