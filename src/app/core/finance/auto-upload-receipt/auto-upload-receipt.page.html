<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/add-transaction" text="" color="dark"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center" mode="ios">掃描收據</ion-title>
    <ion-buttons slot="end">
      <ion-badge color="primary" class="ion-margin-end" *ngIf="selectedImages.length > 0" mode="ios">
        {{ selectedImages.length }} Selected
      </ion-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="warning-banner" *ngIf="!hasApiKey">
    <div class="icon-wrapper">
      <ion-icon name="key-outline"></ion-icon>
    </div>
    <div class="text-wrapper">
      <h4>需要 Gemini API Key</h4>
      <p>請前往設定頁面輸入 API Key 以啟用智能辨識功能。</p>
    </div>
  </div>

  <div class="modern-step-indicator">
    <div class="step active"><span class="step-num">1</span><span class="step-text">上傳</span></div>
    <div class="step-line"></div>
    <div class="step"><span class="step-num">2</span><span class="step-text">分析</span></div>
    <div class="step-line"></div>
    <div class="step"><span class="step-num">3</span><span class="step-text">確認</span></div>
  </div>

  <div class="header-prompt" *ngIf="selectedImages.length === 0">
    <div class="icon-circle">
      <ion-icon name="scan-outline"></ion-icon>
    </div>
    <h2>智能收據掃描</h2>
    <p>拍攝或從相簿選擇收據，AI 將自動為您提取金額、分類與購物明細。</p>
  </div>

  <div class="receipt-grid">
    <div class="upload-trigger-card" (click)="selectImageSource()" [class.disabled]="!hasApiKey">
      <div class="trigger-content">
        <ion-icon name="camera-outline"></ion-icon>
        <span>新增收據</span>
      </div>
    </div>

    <div class="receipt-preview-card" *ngFor="let image of selectedImages; let i = index">
      <img [src]="image.webPath || image.path" alt="Receipt Preview">
      <button class="close-badge" (click)="removeImage(i)">
        <ion-icon name="close-outline"></ion-icon>
      </button>
      <div class="card-index-overlay">#{{ i + 1 }}</div>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="footer-safe-area">
    <ion-button 
      expand="block" 
      shape="round"
      color="primary"
      class="analyze-btn"
      (click)="processImages()" 
      [disabled]="selectedImages.length === 0 || !hasApiKey">
      <ion-icon name="sparkles-outline" slot="start"></ion-icon>
      分析 {{ selectedImages.length }} 張收據
    </ion-button>
  </div>
</ion-footer>
